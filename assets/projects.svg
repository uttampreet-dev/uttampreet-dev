<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 300" width="1040" height="300" role="img" aria-label="Featured projects">
  <!-- CARD 1 -->
  <g>
    <rect x="20" y="22" width="480" height="256" rx="16" fill="#F5F9FF" stroke="#C7DCF4" stroke-width="1.5"/>
    <rect x="20" y="22" width="480" height="6" rx="3" fill="#8FC2F0"/>
    <circle cx="52" cy="62" r="4" fill="#3B82D6"/>
    <text x="66" y="67" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="#2C6BB3">ShadowTrace</text>
    <text x="52" y="94" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6E86AB">Multi-Agent Misinformation Detection</text>
    <text x="52" y="128" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#48586F">Maps coordinated bot networks, detects synchronized</text>
    <text x="52" y="149" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#48586F">amplification across platforms, and turns raw signals</text>
    <text x="52" y="170" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#48586F">into real-time threat assessments.</text>
    <g font-family="'JetBrains Mono',monospace" font-size="11" fill="#3A6CA6" text-anchor="middle">
      <g><rect x="52" y="214" width="60" height="24" rx="7" fill="#E9F2FC" stroke="#CFE1F5"/><text x="82" y="230">Next.js</text></g>
      <g><rect x="120" y="214" width="66" height="24" rx="7" fill="#E9F2FC" stroke="#CFE1F5"/><text x="153" y="230">FastAPI</text></g>
      <g><rect x="194" y="214" width="84" height="24" rx="7" fill="#E9F2FC" stroke="#CFE1F5"/><text x="236" y="230">LangGraph</text></g>
      <g><rect x="286" y="214" width="52" height="24" rx="7" fill="#E9F2FC" stroke="#CFE1F5"/><text x="312" y="230">Groq</text></g>
      <g><rect x="346" y="214" width="80" height="24" rx="7" fill="#E9F2FC" stroke="#CFE1F5"/><text x="386" y="230">NetworkX</text></g>
    </g>
  </g>

  <!-- CARD 2 -->
  <g>
    <rect x="540" y="22" width="480" height="256" rx="16" fill="#F5F9FF" stroke="#C7DCF4" stroke-width="1.5"/>
    <rect x="540" y="22" width="480" height="6" rx="3" fill="#8FC2F0"/>
    <circle cx="572" cy="62" r="4" fill="#3B82D6"/>
    <text x="586" y="67" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="#2C6BB3">FirstSignal</text>
    <text x="572" y="94" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6E86AB">Autonomous AI Customer Care</text>
    <text x="572" y="128" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#48586F">Senses customer frustration before they churn —</text>
    <text x="572" y="149" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#48586F">blending voice and text, real-time signals, and</text>
    <text x="572" y="170" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#48586F">automated intervention into one loop.</text>
    <g font-family="'JetBrains Mono',monospace" font-size="11" fill="#3A6CA6" text-anchor="middle">
