<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 300" width="1040" height="300" role="img" aria-label="Featured projects">
  <defs>
    <linearGradient id="cardbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1524"/><stop offset="1" stop-color="#0A0E17"/>
    </linearGradient>
    <linearGradient id="sheenA" gradientUnits="userSpaceOnUse" x1="20" y1="0" x2="170" y2="0">
      <stop offset="0" stop-color="#58A6FF" stop-opacity="0"/><stop offset="0.5" stop-color="#A6D2FF"/><stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-190 0" to="500 0" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="sheenB" gradientUnits="userSpaceOnUse" x1="560" y1="0" x2="710" y2="0">
      <stop offset="0" stop-color="#58A6FF" stop-opacity="0"/><stop offset="0.5" stop-color="#A6D2FF"/><stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-190 0" to="500 0" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="cardglow" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#1E4E8C" stop-opacity="0.5"/><stop offset="1" stop-color="#1E4E8C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- CARD 1 -->
  <g>
    <rect x="20" y="22" width="480" height="256" rx="16" fill="none" stroke="#26344F" stroke-width="1.5"/>
    <rect x="20" y="22" width="480" height="120" rx="16" fill="url(#cardglow)"/>
    <rect x="34" y="22" width="452" height="3" rx="1.5" fill="url(#sheenA)"/>
    <circle cx="52" cy="60" r="4" fill="#58A6FF"><animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <text x="66" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="#58A6FF">ShadowTrace</text>
    <text x="52" y="92" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8FA6C4">Multi-Agent Misinformation Detection</text>
    <text x="52" y="126" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#AEBAD2">Maps coordinated bot networks, detects synchronized</text>
    <text x="52" y="147" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#AEBAD2">amplification across platforms, and turns raw signals</text>
    <text x="52" y="168" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#AEBAD2">into real-time threat assessments.</text>
    <g font-family="'JetBrains Mono',monospace" font-size="11" fill="#7FA3D8">
      <g><rect x="52" y="212" width="60" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="82" y="228" text-anchor="middle">Next.js</text></g>
      <g><rect x="120" y="212" width="66" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="153" y="228" text-anchor="middle">FastAPI</text></g>
      <g><rect x="194" y="212" width="84" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="236" y="228" text-anchor="middle">LangGraph</text></g>
      <g><rect x="286" y="212" width="52" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="312" y="228" text-anchor="middle">Groq</text></g>
      <g><rect x="346" y="212" width="80" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="386" y="228" text-anchor="middle">NetworkX</text></g>
    </g>
  </g>

  <!-- CARD 2 -->
  <g>
    <rect x="540" y="22" width="480" height="256" rx="16" fill="none" stroke="#26344F" stroke-width="1.5"/>
    <rect x="540" y="22" width="480" height="120" rx="16" fill="url(#cardglow)"/>
    <rect x="554" y="22" width="452" height="3" rx="1.5" fill="url(#sheenB)"/>
    <circle cx="572" cy="60" r="4" fill="#58A6FF"><animate attributeName="opacity" values="1;0.3;1" dur="2.2s" begin="1.1s" repeatCount="indefinite"/></circle>
    <text x="586" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="#58A6FF">FirstSignal</text>
    <text x="572" y="92" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8FA6C4">Autonomous AI Customer Care</text>
    <text x="572" y="126" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#AEBAD2">Senses customer frustration before they churn —</text>
    <text x="572" y="147" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#AEBAD2">blending voice and text, real-time signals, and</text>
    <text x="572" y="168" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#AEBAD2">automated intervention into one loop.</text>
    <g font-family="'JetBrains Mono',monospace" font-size="11" fill="#7FA3D8">
      <g><rect x="572" y="212" width="60" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="602" y="228" text-anchor="middle">Next.js</text></g>
      <g><rect x="640" y="212" width="52" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="666" y="228" text-anchor="middle">Groq</text></g>
      <g><rect x="700" y="212" width="50" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="725" y="228" text-anchor="middle">Vapi</text></g>
      <g><rect x="758" y="212" width="74" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="795" y="228" text-anchor="middle">Supabase</text></g>
      <g><rect x="840" y="212" width="82" height="24" rx="7" fill="#111A2B" stroke="#25344F"/><text x="881" y="228" text-anchor="middle">TypeScript</text></g>
    </g>
  </g>
</svg>
