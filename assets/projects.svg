      <g><rect x="640" y="214" width="52" height="24" rx="7" fill="#E9F2FC" stroke="#CFE1F5"/><text x="666" y="230">Groq</text></g>
      <g><rect x="700" y="214" width="50" height="24" rx="7" fill="#E9F2FC" stroke="#CFE1F5"/><text x="725" y="230">Vapi</text></g>
