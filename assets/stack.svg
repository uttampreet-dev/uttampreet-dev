<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340" role="img" aria-label="Tech stack">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1524"/><stop offset="1" stop-color="#0A0E17"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58A6FF" stop-opacity="0"/><stop offset="0.5" stop-color="#58A6FF" stop-opacity="0.16"/><stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- transparent background (blends into GitHub) -->
  <!-- faint stars -->
  <g fill="#7FA3D8" opacity="0.25">
    <circle cx="860" cy="40" r="1.2"/><circle cx="920" cy="90" r="1"/><circle cx="800" cy="300" r="1.1"/><circle cx="940" cy="250" r="1"/>
  </g>
  <!-- scanning light -->
  <rect x="0" y="1" width="70" height="338" fill="url(#scan)">
    <animateTransform attributeName="transform" type="translate" from="-70 0" to="1000 0" dur="5.5s" repeatCount="indefinite"/>
  </rect>

  <g font-family="'JetBrains Mono',monospace">
    <!-- row labels + dots -->
    <g font-size="12" letter-spacing="1.5" fill="#5C6E90">
      <circle cx="42" cy="52" r="4" fill="#58A6FF"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
      <text x="58" y="56">LANGUAGES</text>
      <circle cx="42" cy="112" r="4" fill="#58A6FF"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" begin="0.4s" repeatCount="indefinite"/></circle>
      <text x="58" y="116">FRONTEND</text>
      <circle cx="42" cy="172" r="4" fill="#58A6FF"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" begin="0.8s" repeatCount="indefinite"/></circle>
      <text x="58" y="176">AI · ML</text>
      <circle cx="42" cy="232" r="4" fill="#58A6FF"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
      <text x="58" y="236">BACKEND</text>
      <circle cx="42" cy="292" r="4" fill="#58A6FF"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" begin="1.6s" repeatCount="indefinite"/></circle>
      <text x="58" y="296">TOOLS</text>
    </g>

    <!-- pills -->
    <g font-size="12.5" fill="#9FB6D6" text-anchor="middle">
      <!-- languages -->
      <g><rect x="200" y="39" width="94" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="247" y="56">TypeScript</text></g>
      <g><rect x="302" y="39" width="94" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="349" y="56">JavaScript</text></g>
      <g><rect x="404" y="39" width="74" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="441" y="56">Python</text></g>
      <!-- frontend -->
      <g><rect x="200" y="99" width="64" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="232" y="116">React</text></g>
      <g><rect x="272" y="99" width="70" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="307" y="116">Next.js</text></g>
      <g><rect x="350" y="99" width="106" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="403" y="116">TailwindCSS</text></g>
      <g><rect x="464" y="99" width="62" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="495" y="116">D3.js</text></g>
      <!-- ai ml -->
      <g><rect x="200" y="159" width="90" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="245" y="176">LangGraph</text></g>
      <g><rect x="298" y="159" width="58" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="327" y="176">Groq</text></g>
      <g><rect x="364" y="159" width="70" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="399" y="176">Gemini</text></g>
      <g><rect x="442" y="159" width="52" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="468" y="176">RAG</text></g>
      <g><rect x="502" y="159" width="116" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="560" y="176">Hugging Face</text></g>
      <g><rect x="626" y="159" width="54" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="653" y="176">Vapi</text></g>
      <g><rect x="688" y="159" width="86" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="731" y="176">NetworkX</text></g>
      <!-- backend -->
      <g><rect x="200" y="219" width="76" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="238" y="236">FastAPI</text></g>
      <g><rect x="284" y="219" width="86" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="327" y="236">Supabase</text></g>
      <g><rect x="378" y="219" width="100" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="428" y="236">PostgreSQL</text></g>
      <g><rect x="486" y="219" width="74" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="523" y="236">Node.js</text></g>
      <!-- tools -->
      <g><rect x="200" y="279" width="52" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="226" y="296">Git</text></g>
      <g><rect x="260" y="279" width="72" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="296" y="296">GitHub</text></g>
      <g><rect x="340" y="279" width="74" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="377" y="296">Docker</text></g>
      <g><rect x="422" y="279" width="78" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="461" y="296">VS Code</text></g>
      <g><rect x="508" y="279" width="62" height="26" rx="8" fill="#111A2B" stroke="#25344F"/><text x="539" y="296">Linux</text></g>
    </g>
  </g>
</svg>
