  </defs>

  <text x="500" y="44" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12.5" letter-spacing="2" fill="#9DB0CE">&lt;/&gt; full-stack &#183; applied AI</text>

  <text x="500" y="104" text-anchor="middle" clip-path="url(#rev)" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-style="italic" font-weight="800" font-size="56" letter-spacing="-1" fill="url(#nm)">Uttampreet Kaur</text>

  <rect y="66" width="6" height="42" rx="1.5" fill="#5EA0E6">
    <animate attributeName="x" values="278;748;748;278" keyTimes="0;0.42;0.9;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="500" y="146" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="14" letter-spacing="1.5" fill="#93A6C4">aspiring software developer</text>
