<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 170" width="1000" height="170" role="img" aria-label="Uttampreet Kaur — aspiring software developer">
  <defs>
    <linearGradient id="nm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82D6"/><stop offset="0.5" stop-color="#5EA0E6"/><stop offset="1" stop-color="#8FC2F0"/>
    </linearGradient>
    <clipPath id="rev">
      <rect x="278" y="0" width="0" height="170">
        <animate attributeName="width" values="0;470;470;0" keyTimes="0;0.42;0.9;1" dur="5s" repeatCount="indefinite"/>
      </rect>
