<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" role="img" aria-label="Uttampreet Kaur — AI for trust and safety">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8B923"/>
      <stop offset="1" stop-color="#E8B923" stop-opacity="0.35"/>
    </linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#E6EDF3" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- self-contained dark card: looks intentional on light AND dark GitHub themes -->
  <rect x="1" y="1" width="898" height="238" rx="18" fill="#0D1117" stroke="#161B22"/>
  <rect x="1" y="1" width="898" height="238" rx="18" fill="url(#grid)"/>

  <!-- kicker -->
  <text x="56" y="74" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="4"
        fill="#8B949E">AI · TRUST · SAFETY</text>

  <!-- name -->
  <text x="54" y="140" font-family="Inter, Segoe UI, sans-serif" font-size="52" font-weight="800"
        fill="#E6EDF3">Uttampreet Kaur<tspan fill="#E8B923">.</tspan></text>

  <!-- blinking cursor -->
  <rect x="520" y="108" width="14" height="40" fill="#E8B923">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="56" y="180" font-family="JetBrains Mono, monospace" font-size="15"
        fill="#8B949E">AI for trust &amp; safety — I make the complex legible.</text>

  <!-- accent underline draws in on load -->
  <line x1="56" y1="202" x2="56" y2="202" stroke="url(#accent)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" from="56" to="360" dur="1.4s" begin="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
  </line>
</svg>
